<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A股每日股票推荐系统</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">China A-Share Daily Picks</p>
        <h1>A股每日 10 只股票推荐</h1>
        <p class="header-copy">聚焦中国 A 股，按热点科技成长与低价低位成长两类策略生成候选清单。</p>
      </div>
      <div class="mode-actions" aria-label="推荐类型">
        <button id="techButton" type="button" class="primary-button active">科技股推荐</button>
        <button id="lowPriceButton" type="button" class="secondary-button">低单价股票推荐</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel recommendations-panel">
        <div class="section-heading">
          <div>
            <h2 id="modeTitle">科技股推荐</h2>
            <p id="runMeta">AI算力、半导体、机器人、低空经济等热点科技赛道</p>
          </div>
          <span id="strategyBadge" class="badge">A股策略</span>
        </div>
        <div id="recommendations" class="recommendations empty-state">
          <p>正在读取 A 股候选股票池。</p>
        </div>
      </section>

      <aside class="panel insight-panel">
        <h2>筛选逻辑</h2>
        <div id="strategyText" class="strategy-text"></div>
        <div class="notice">
          <strong>数据说明</strong>
          <p>当前为本地样例股票池，字段包含行业赛道、成长评分、风险评分、当前价格与近三年价格序列。接入真实行情后，可每日自动更新 `data/stocks.json`。</p>
        </div>
      </aside>
    </main>

    <section class="panel history-panel">
      <div class="section-heading compact">
        <h2>历史运行</h2>
        <button id="clearHistoryButton" type="button" class="ghost-button">清空</button>
      </div>
      <div id="history" class="history-list empty-state">
        <p>暂无历史记录。</p>
      </div>
    </section>

    <script src="src/app.js" type="module"></script>
  </body>
</html>
